name: Deploy Walt Worker

# Deploys the Cloudflare Worker that proxies Walt's requests to Hugging Face.
#
# Required repository secrets:
#   CF_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CF_ACCOUNT_ID  — Your Cloudflare account ID (Settings → Copy account ID)
#   HF_TOKEN       — A free Hugging Face read token (huggingface.co/settings/tokens)
#
# After the first deployment, copy the Worker URL from the workflow logs
# (it looks like https://walt-proxy.<subdomain>.workers.dev) and add it as:
#   WALT_PROXY_URL — the full Worker URL
# Then trigger a site rebuild so Eleventy bakes the URL into /walt.

on:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set HF_TOKEN secret on Worker
        run: echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
